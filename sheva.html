<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEVA LLM - Analysis Tool</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js for charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Plotly.js for the Sunburst visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.33.0/plotly.min.js"></script>
  
    <!-- D3.js for hierarchical trees -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .collapsible-content.expanded {
            max-height: 5000px;
        }
        .cta-button {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4), 0 4px 6px -2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>

<body class="bg-gray-50">

    <div class="body-wrap">
        <!-- HEADER -->
        <header class="bg-white shadow-md sticky top-0 z-30">
            <div class="container mx-auto px-6 sm:px-8">
                <div class="flex items-center justify-between h-20">
                    <!-- Logo and Title -->
                    <div class="shrink-0 mr-4">
                        <a href="index.html" class="flex items-center text-gray-800">
                            <svg class="w-8 h-8" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient x1="0%" y1="100%" y2="0%" id="logo-grad">
                                        <stop stop-color="#6366F1" offset="0%"/>
                                        <stop stop-color="#818CF8" offset="100%"/>
                                    </linearGradient>
                                </defs>
                                <path d="M16 0A16 16 0 000 16a16 16 0 0016 16c8.837 0 16-7.163 16-16A16 16 0 0016 0zm0 24.167a8.167 8.167 0 110-16.334 8.167 8.167 0 010 16.334z" fill="url(#logo-grad)"/>
                            </svg>
                            <span class="ml-3 text-2xl font-bold">SHEVA LLM</span>
                        </a>
                    </div>
                    
                    <!-- CSV Upload Button -->
                    <div class="flex items-center">
                        <label for="csvFileInput" class="cta-button inline-block bg-indigo-500 text-white font-semibold rounded-lg px-6 py-3 text-base shadow-lg cursor-pointer">
                            <i class="fas fa-upload mr-2"></i>
                            Upload CSV
                        </label>
                        <input type="file" id="csvFileInput" accept=".csv" class="hidden">
                    </div>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT AREA -->
        <main class="container mx-auto py-12 px-6 sm:px-8">
            <div id="content-area" class="bg-white p-6 md:p-8 rounded-xl shadow-lg min-h-[60vh]">
                <div id="placeholder" class="text-center text-gray-500 flex flex-col justify-center items-center h-full">
                    <i class="fas fa-table text-6xl text-gray-300 mb-4"></i>
                    <h2 class="text-2xl font-semibold">No Data Loaded</h2>
                    <p class="mt-2">Please upload a CSV file to begin the analysis.</p>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="bg-gray-800 text-white">
            <div class="container mx-auto px-6 sm:px-8 py-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div class="text-center md:text-left mb-4 md:mb-0">
                        <a href="index.html" class="flex items-center">
                            <svg class="w-8 h-8" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient x1="0%" y1="100%" y2="0%" id="logo-footer-grad">
                                        <stop stop-color="#A5B4FC" offset="0%"/>
                                        <stop stop-color="#818CF8" offset="100%"/>
                                    </linearGradient>
                                </defs>
                                <path d="M16 0A16 16 0 000 16a16 16 0 0016 16c8.837 0 16-7.163 16-16A16 16 0 0016 0zm0 24.167a8.167 8.167 0 110-16.334 8.167 8.167 0 010 16.334z" fill="url(#logo-footer-grad)"/>
                            </svg>
                            <span class="ml-3 text-xl font-bold">SHEVA 2.0</span>
                        </a>
                    </div>
                    <div class="text-center text-sm text-gray-400">
                        &copy; 2025 SHEVA 2.0, all rights reserved.
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- ORDEM CORRETA: Primeiro os utilitários e ferramentas -->
    <script src="tsne.js" defer></script>
    <script src="visualizationtools.js" defer></script>
    <script src="ai_utilities.js" defer></script>
    
    <!-- CRÍTICO: Carregar CORE antes de UI -->
    <script src="sheva_core.js" defer></script>
    <script src="sheva_ui.js" defer></script>
    
    <!-- Por último, o gerador de hipóteses que depende dos anteriores -->
    <script src="generatehypotheses.js" defer></script>
    
</body>
</html>
